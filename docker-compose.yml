services:
  # ---------------------------------------------------------------------------
  # Crawler — maestro
  # ---------------------------------------------------------------------------
  crawler:
    build:
      context: ./crawler
      dockerfile: Dockerfile
    container_name: crawler
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./crawler:/var/www/html
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      - APP_ENV=local
    command: ["tail", "-f", "/dev/null"]
    networks:
      - crawlers-network

  # ---------------------------------------------------------------------------
  # Crawler Worker — Consome as filas do RabbitMQ via Supervisor
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: ./crawler
      dockerfile: Dockerfile
    container_name: worker
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./crawler:/var/www/html
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      crawler:
        condition: service_started
    environment:
      - APP_ENV=local
    command: ["/usr/bin/supervisord", "-n", "-c", "/etc/supervisor/supervisord.conf"]
    networks:
      - crawlers-network

  # ---------------------------------------------------------------------------
  # Backend — BFF Catalog REST API
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    working_dir: /var/www/html
    ports:
      - "8080:8000"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - APP_ENV=local
    networks:
      - crawlers-network

  # ---------------------------------------------------------------------------
  # Frontend — Next.js 16
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    depends_on:
      backend:
        condition: service_started
    environment:
      - NODE_ENV=development
      - BACKEND_URL=http://backend:8000
      - WATCHPACK_POLLING=true
    networks:
      - crawlers-network

  # ---------------------------------------------------------------------------
  # RabbitMQ — Broker de Mensageria
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672"
      - "15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crawlers-network

  # ---------------------------------------------------------------------------
  # MongoDB — Staging Area / Data Lake de dados brutos não-estruturados
  # ---------------------------------------------------------------------------
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017"
    environment:
      MONGO_INITDB_DATABASE: raw_data_lake
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crawlers-network

  # ---------------------------------------------------------------------------
  # PostgreSQL — Banco de Dados Relacional
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432"
    environment:
      POSTGRES_DB: web_crawlers
      POSTGRES_USER: crawler
      POSTGRES_PASSWORD: crawler_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crawler -d web_crawlers"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crawlers-network

  # ---------------------------------------------------------------------------
  # Redis — Camada de Cache (utilizado estritamente pelo backend)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - crawlers-network

# ---------------------------------------------------------------------------
# Volumes persistentes
# ---------------------------------------------------------------------------
volumes:
  rabbitmq_data:
    driver: local
  mongodb_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ---------------------------------------------------------------------------
# Rede compartilhada
# ---------------------------------------------------------------------------
networks:
  crawlers-network:
    driver: bridge
