###############################################################################
# Vehicle Crawler ETL — Docker Compose
# Serviços: crawler (app), worker, backend (api), rabbitmq, postgres
###############################################################################

services:
  # ---------------------------------------------------------------------------
  # Crawler — Container PHP 8.4 com Laravel CLI
  # Responsável por executar o comando `php artisan crawl:vehicles`
  # ---------------------------------------------------------------------------
  crawler:
    build:
      context: ./crawler
      dockerfile: Dockerfile
    container_name: crawler
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./crawler:/var/www/html
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - APP_ENV=local
    # Mantém o container rodando para execução de comandos artisan
    command: ["tail", "-f", "/dev/null"]
    networks:
      - crawlers-network

  # ---------------------------------------------------------------------------
  # Worker — Consome a fila etl-vehicles do RabbitMQ
  # Container idêntico ao crawler, mas iniciado como queue worker
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: ./crawler
      dockerfile: Dockerfile
    container_name: worker
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./crawler:/var/www/html
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      crawler:
        condition: service_started
    environment:
      - APP_ENV=local
    command: ["php", "artisan", "queue:work", "rabbitmq", "--queue=etl-vehicles,crawler-brands,crawler-locations,crawler-portals", "--tries=3", "--timeout=60", "--sleep=3"]
    networks:
      - crawlers-network

  # ---------------------------------------------------------------------------
  # Backend — BFF Catalog REST API
  # Disponível em http://localhost:8080
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    working_dir: /var/www/html
    ports:
      - "8080:8000"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - APP_ENV=local
    networks:
      - crawlers-network

  # ---------------------------------------------------------------------------
  # Frontend — Next.js 16 (App Router)
  # Disponível em http://localhost:3000
  # Proxy interno aponta para o container "backend" na porta 8000
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:8000
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://backend:8000
    networks:
      - crawlers-network

  # ---------------------------------------------------------------------------
  # RabbitMQ — Broker de Mensageria
  # Management UI disponível em http://localhost:15672 (guest/guest)
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crawlers-network

  # ---------------------------------------------------------------------------
  # PostgreSQL — Banco de Dados Relacional
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: web_crawlers
      POSTGRES_USER: crawler
      POSTGRES_PASSWORD: crawler_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crawler -d web_crawlers"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crawlers-network

# ---------------------------------------------------------------------------
# Volumes persistentes
# ---------------------------------------------------------------------------
volumes:
  rabbitmq_data:
    driver: local
  postgres_data:
    driver: local

# ---------------------------------------------------------------------------
# Rede compartilhada
# ---------------------------------------------------------------------------
networks:
  crawlers-network:
    driver: bridge
